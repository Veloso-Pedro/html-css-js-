<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de carros | Vendas</title>
    <style>
        body{
            margin: 0;
            padding: 30p;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            color: #222;
        }

        .container{
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        h1{
            text-align: center;
            margin-bottom: 10px;
        }

        p.descricao{
            text-align: center;
            margin-bottom: 30px;
            color: #555;
        }

        .imagem-top{
            display: block;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }

        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        tbody td{
            text-align: center;
            vertical-align: middle;
        }

        thead th{
            background-color: #dcdcdc;
            font-weight: bold;
        }

        tbody tr:nth-child(even){
            background-color: #f9f9f9;
        }

        tfoot td{
            background-color: #efefef;
            font-weight: bold;
            text-align: center;
        }

        .col-marca {
            width: 30%;
        }

        .col-modelo{
            width: 40%;
        }

        .col-ano{
            width: 30%;
        }

        .imagem-carros{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .imagem-carros img{
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
         
        .rodape-imagem{
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="imagem-top" src="./img/Corolla.jpeg" alt="Corolla">
        <h1>Tabela de Veículos | Vendas</h1>
        <p class="descricao">
            tabela modelo de vendas, com as melhores marcas do mercado!
        </p>
        <table>
            <thead>
                <tr>
                    <th class="col-marca">Marca</th>
                    <th class="col-modelo">Modelo</th>
                    <th class="col-ano">Ano</th>
                </tr>
            </thead>
            <!-- Início tbody -->
             <tbody>
                <tr>
                    <td rowspan="2">Toyota</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/Corolla.jpeg" alt="Toyota Corolla">
                            <span>Corolla</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/CorollaCross.jpeg" alt="Toyota Corolla Cross">
                            <span>Corolla Cross</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <!-- Inicios volkswagen-->
                <tr>
                    <td rowspan="3">volkswagen</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/Jetta GLI.jpeg" alt="volkswagen Jetta GLI">
                            <span>volkswagen Jetta GLI</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/Golf GTI.jpeg" alt="volkswagen Golf GLI">
                            <span>volkswagen Golf GLI</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/Tiguan R Line.jpeg" alt="volkswagen Tiguan R Line">
                            <span>volkswagen Tiguan R Line</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <!-- Início Jaguar -->
                <tr>
                    <td>Jaguar</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/Jaguar F-Type 75.jpeg" alt="Jaguar F-Type 75">
                            <span>Jaguar F-Type 75</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
             </tbody>
             <tfoot>
                <tr>
                    <td colspan="3">Última atualização: 23/03/2026</td>
                </tr>
             </tfoot>
        </table>
        <img class="rodape-imagem" src="./img/Logo.png" alt="">
    </div>
</body>
</html>
